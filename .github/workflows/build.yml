name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller merge_skeletons_win.spec --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpineSkeletonMerger-Windows
          path: dist/SpineSkeletonMerger.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app (onedir)
        run: pyinstaller merge_skeletons_mac.spec --noconfirm

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r SpineSkeletonMerger-Mac.zip SpineSkeletonMerger.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpineSkeletonMerger-Mac
          path: dist/SpineSkeletonMerger-Mac.zip
